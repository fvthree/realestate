version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sellerapi-postgres
    environment:
      POSTGRES_DB: sellerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-setup.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sellerdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sellerapi-network

volumes:
  postgres_data:
    driver: local

networks:
  sellerapi-network:
    driver: bridge

